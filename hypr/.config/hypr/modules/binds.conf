# See https://wiki.hypr.land/Configuring/Keywords/
exec = hyprctl dispatch submap global
submap = global

$mainMod = SUPER # Sets "Windows" key as main modifier

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, T, exec, ghostty
bind = $mainMod, Q, killactive,
bind = $mainMod, E, exec, nautilus
bind = $mainMod, Z, exec, ghostty --title=mixer -e wiremix
bind = $mainMod, X, exec, ~/.config/scripts/hypr_toggle_floating
bind = $mainMod, G, exec, ~/.config/scripts/hypr_ws_toggle_gaps
bind = $mainMod, J, togglesplit, # dwindle

# delta shell
bind = $mainMod, Space, exec, ~/.config/ags/delta-shell/delta-shell toggle applauncher
bind = $mainMod, v, exec, ~/.config/ags/delta-shell/delta-shell toggle clipboard
bind = $mainMod, s, exec, ~/.config/ags/delta-shell/delta-shell toggle quicksettings

# Noctalia
# bind = $mainMod, S, exec, qs -c noctalia-shell ipc call controlCenter toggle
# bind = $mainMod, Slash, exec, qs -c noctalia-shell ipc call settings toggle
# bind = $mainMod, V, exec, qs -c noctalia-shell ipc call launcher clipboard
# bind = $mainMod ALT, W, exec, qs -c noctalia-shell ipc call wallpaper toggle
# bind=,XF86PowerOff,exec,qs -c noctalia-shell ipc call lockScreen lock & systemctl suspend
# bind = $mainMod ALT, L, exec, qs -c noctalia-shell ipc call lockScreen lock
# bind = $mainMod SHIFT, Q, exec, qs -c noctalia-shell ipc call sessionMenu toggle
# bind = $mainMod, A, exec, swaync-client --toggle-panel

# Dms
# bind = $mainMod, space, exec, dms ipc call spotlight toggle
# bind = $mainMod, V, exec, dms ipc call clipboard toggle
# bind = $mainMod, M, exec, dms ipc call processlist focusOrToggle
# bind = $mainMod, comma, exec, dms ipc call settings focusOrToggle
# bind = $mainMod, N, exec, dms ipc call notifications toggle
# bind = $mainMod, Y, exec, dms ipc call dankdash wallpaper
# bind = $mainMod, TAB, exec, dms ipc call hypr toggleOverview
# bind = $mainMod ALT, L, exec, dms ipc call lock lock
 bind = $mainMod, C, exec, hyprpicker -a # dms color pick -a

# Caelestia
# Launcher
 bind = Super, space, global, caelestia:launcher
 bind = Ctrl+Alt, Delete, global, caelestia:session
 bindl = Ctrl+Alt, C, global, caelestia:clearNotifs
 bind = Super, a, global, caelestia:showall
 bind = Super+Alt, L, global, caelestia:lock
 bind = $mainMod, s, exec, caelestia shell drawers toggle sidebar
 bind = Ctrl+Shift, Escape, exec, caelestia toggle sysmon
 bind = Super, M, exec, caelestia toggle music
 bind = Super, D, exec, caelestia toggle communication
 bind = Super, R, exec, caelestia toggle todo

# Move focus with mainMod + arrow keys
 bind = $mainMod, period, layoutmsg, move +col
 bind = $mainMod, comma, layoutmsg, move -col

bind = $mainMod SHIFT, H, layoutmsg, swapcol l
bind = $mainMod SHIFT, J, exec, ~/.config/scripts/hypr_win_or_ws move down
bind = $mainMod SHIFT, K, exec, ~/.config/scripts/hypr_win_or_ws move up
bind = $mainMod SHIFT, L, layoutmsg, swapcol r

bind = $mainMod, H, layoutmsg, focus l
bind = $mainMod, J, exec, ~/.config/scripts/hypr_win_or_ws focus down
bind = $mainMod, K, exec, ~/.config/scripts/hypr_win_or_ws focus up
bind = $mainMod, L, layoutmsg, focus r

bind = $mainMod, Equal, layoutmsg, colresize +0.1
bind = $mainMod, Minus, layoutmsg, colresize -0.1
bind = $mainMod, F, exec, ~/.config/scripts/hypr_maximize
bind = $mainMod SHIFT, F, fullscreen, 0

bindl = Super+Alt, f12, exec, notify-send -u low -i dialog-information-symbolic 'Test notification' "Here's a really long message to test truncation and wrapping\nYou can middle click or flick this notification to dismiss it!" -a 'Shell' -A "Test1=I got it!" -A "Test2=Another action"


# Screenshot
$scrPath = ~/Pictures/Screenshots
bind = , Print, global, caelestia:screenshotFreeze  # Capture region (freeze)  
# dms screenshot --stdout | satty --filename - --output-filename $scrPath/satty-$(date +'%Y-%m-%d-%H:%M:%S').png
bind = CTRL, Print, exec, caelestia screenshot # Full screen capture > clipboard 
# dms screenshot full --stdout | satty --filename - --fullscreen --output-filename $scrPath/satty-$(date '+%Y%m%d-%H:%M:%S').png
# bind = $mainMod, Print, exec, hyprshot -m window --raw | satty --filename - --output-filename $scrPath/satty-$(date +'%Y-%m-%d-%H:%M:%S').png



# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Example special workspace (scratchpad)
# bind = $mainMod, A, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, if [[ $(playerctl -p spotify status) =~ ^(Playing|Paused)$ ]]; then playerctl -p spotify play-pause; else playerctl play-pause; fi
bindl = , XF86AudioPlay, exec, if [[ $(playerctl -p spotify status) =~ ^(Playing|Paused)$ ]]; then playerctl -p spotify play-pause; else playerctl play-pause; fi
bindl = , XF86AudioPrev, exec, playerctl previous
