"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

# $os\
# $username\
format = """
$directory\
$character\
"""

right_format = """
$git_branch\
$git_status\
$c\
$rust\
"""
# $time

palette = 'catppuccin_mocha'

[profiles]
transient="""
$character\
"""

rtransient="""
$status\
$cmd_duration\
$time\
"""

[fill]
symbol = " "

[jobs]
symbol = ' '
style = "fg:red"
number_threshold = 4
symbol_threshold = 0
[os]
disabled = false
style = "fg:red"

[os.symbols]
Windows = ""
Ubuntu = "󰕈"
SUSE = ""
Raspbian = "󰐿"
Mint = "󰣭"
Macos = "󰀵"
Manjaro = ""
Linux = "󰌽"
Gentoo = "󰣨"
Fedora = "󰣛"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Redhat = "󱄛"
Nobara = "󱄛"
RedHatEnterprise = "󱄛"

[username]
show_always = true
style_user = "fg:red"
style_root = "fg:red"
format = '[ $user]($style)'

[directory]
style = "fg:peach"
format = "[$read_only]($read_only_style)[$path ]($style)"
read_only = " "
read_only_style = "maroon"
truncation_length = 0
truncation_symbol = "…/"

[directory.substitutions]
# "~" = "  "
"Applications" = "  "
"Desktop" = "  "
"Developer" = "  "
"Documents" = " 󰈙 "
"Downloads" = "  "
"Games" = "  "
"GitHub" = "  "
"Library" = "  "
"Movies" = "  "
"Music" = "  "
"Pictures" = "  "
"Projects" = "  "
"Public" = "  "
"Screenshots" = " 󱣴 "
"Videos" = "  "
"Thunderbird" = "   "
"source" = " 󰈹 "
"comm" = "  "

[git_branch]
symbol = ""
style = "fg:yellow"
format = '[[ $symbol $branch ](fg:yellow)]($style)'

[git_status]
style = "fg:yellow"
format = '[[($all_status$ahead_behind )](fg:yellow)]($style)'

[nodejs]
symbol = ""
style = "fg:green"
format = '[[ $symbol( $version) ](fg:green)]($style)'

[c]
symbol = " "
style = "fg:green"
format = '[[ $symbol( $version) ](fg:green)]($style)'

[rust]
symbol = ""
style = "fg:peach"
format = '[[ $symbol( $version) ](fg:peach)]($style)'

[golang]
symbol = ""
style = "fg:teal"
format = '[[ $symbol( $version) ](bg:teal)]($style)'

[java]
symbol = " "
style = "fg:red"
format = '[[ $symbol( $version) ](fg:green)]($style)'

[kotlin]
symbol = ""
style = "fg:mauve"
format = '[[ $symbol( $version) ](fg:mauve)]($style)'

[haskell]
symbol = ""
style = "fg:green"
format = '[[ $symbol( $version) ](bg:green)]($style)'

[python]
symbol = ""
style = "fg:blue"
format = '[[ $symbol( $version)(\(#$virtualenv\)) ](fg:green)]($style)'

[docker_context]
symbol = ""
style = "bg:sapphire"
format = '[[ $symbol( $context) ](fg:sapphire)]($style)'

[conda]
symbol = "  "
style = "fg:sapphire"
format = '[$symbol$environment ]($style)'
ignore_base = false

[time]
disabled = false
time_format = "%R"
style = "fg:lavender"
format = '[[  $time  ](fg:lavender)]($style)'

[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[- ❯](bold fg:green)'
error_symbol = '[- ❯](bold fg:red)'
vimcmd_symbol = '[- ❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:lavender)'
vimcmd_replace_symbol = '[❮](bold fg:lavender)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

[cmd_duration]
show_milliseconds = false
format = "[󱎫 $duration]($style)  "
style = "bold fg:sky"
disabled = false
show_notifications = true
min_time_to_notify = 45000

[palettes.catppuccin_mocha]
